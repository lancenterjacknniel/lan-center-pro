<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel LAN Center</title>
<link rel="stylesheet" href="style.css">

<style>
.botones-qr{
display:flex;
gap:10px;
margin-top:10px;
flex-wrap:wrap;
}

.botones-qr button{
flex:1;
}

.zoom{
transform:scale(1.5);
z-index:1000;
position:relative;
}
</style>
</head>

<body>

<div class="header-premium">
<div class="top-logo">
<img src="logo.png" class="logo">
</div>

<h1 class="titulo">PANEL LAN CENTER JACKNNIEL</h1>
<h2 id="rolTexto" class="rol"></h2>
</div>

<hr>

<div class="menu-botones" id="menuCategorias"></div>

<br>

<div id="panelDinamico"></div>

<br>

<button class="btn-salir" onclick="logout()">Salir</button>

<script>

/* LOGIN */
let user = localStorage.getItem("user")
if(!user){ window.location.href="login.html" }
document.getElementById("rolTexto").innerText="Usuario: "+user

/* ============================ */
/* CATEGORIAS */
/* ============================ */

async function cargarCategorias(){

let menu = document.getElementById("menuCategorias")
let panel = document.getElementById("panelDinamico")

try{

const res = await fetch("categorias.txt?v="+Date.now())
const texto = await res.text()

let lineas = texto.split("\n")

lineas.forEach(linea=>{

if(!linea.includes("|")) return

let datos = linea.split("|")
let nombre = datos[0].trim()
let archivo = datos[1].trim()
let id = nombre.replaceAll(" ","_")

menu.innerHTML += `
<button class="btn" onclick="abrirCategoria('${id}','${archivo}')">
${nombre}
</button>
`

panel.innerHTML += `
<div id="panel_${id}" class="panel-seccion" style="display:none;">

<h2 class="subtitulo">${nombre}</h2>

<input
class="buscador"
placeholder="🔍 Buscar..."
onkeyup="buscarGeneral(event,'${id}')">

<div id="contenido_${id}">
⏳ Cargando...
</div>

</div>
`

})

}catch{
menu.innerHTML="Error cargando categorias"
}

}

/* ============================ */
/* ABRIR CATEGORIA */
/* ============================ */

function abrirCategoria(id,archivo){

document.querySelectorAll(".panel-seccion").forEach(p=>{
p.style.display="none"
})

let panel = document.getElementById("panel_"+id)
panel.style.display="block"

cargarContenido(archivo,"contenido_"+id)
}

/* ============================ */
/* CARGAR TXT */
/* ============================ */

async function cargarContenido(archivo,contenedor){

let div = document.getElementById(contenedor)

try{

const res = await fetch(archivo+"?v="+Date.now())
const texto = await res.text()

let html=""
let categoriaActual="" 

let lineas = texto.split("\n")

let nombreActual=""
let valorActual=""
let descripcion=""

lineas.forEach(linea=>{

if(linea.startsWith("###")){
categoriaActual = linea.replace("###","").trim()

html += `
<div class="subcategoria">
<button class="btn-sub" onclick="filtrarSub('${categoriaActual}')">
${categoriaActual}
</button>
</div>
`
return
}

linea=linea.trim()

if(linea.includes("|")){

if(nombreActual){
html+=crearTarjeta(nombreActual,valorActual,descripcion,categoriaActual)
}

let partes=linea.split("|")

nombreActual=partes[0].trim()
valorActual=partes.slice(1).join("|").trim()
descripcion=""

}else{
descripcion += linea + "\n"
}

})

if(nombreActual){
html+=crearTarjeta(nombreActual,valorActual,descripcion,categoriaActual)
}

div.innerHTML = `<div class="grid">${html}</div>`

}catch{
div.innerHTML="Error cargando archivo"
}

}

/* ============================ */
/* CREAR TARJETAS */
/* ============================ */

function crearTarjeta(nombre,valor,descripcion,categoriaActual){

if(valor.match(/\.(png|jpg|jpeg|webp|gif)$/i)){

let id="img_"+nombre.replaceAll(" ","")

return `
<div class="card-pro" data-cat="${categoriaActual}" onclick="copiarTarjeta(this)">

<h2>${nombre}</h2>

<img id="${id}"
class="qr-img"
src="${valor}"
onclick="event.stopPropagation(); zoomQR('${id}')">

<div class="texto-pro">${descripcion}</div>

<div class="botones-qr">

<button class="btn-copy" onclick="copiarQR('${id}')">
📋 Copiar
</button>

<button class="btn-download" onclick="descargarQR('${valor}','${nombre}')">
⬇ Descargar
</button>

</div>

</div>
`
}

if(
valor.includes("youtube.com") ||
valor.includes("youtu.be") ||
valor.includes("tiktok.com") ||
valor.includes("instagram.com") ||
valor.includes("facebook.com") ||
valor.match(/\.(mp4|webm|ogg)$/i)
){

return `
<div class="card-pro" data-cat="${categoriaActual}">

<h2>${nombre}</h2>

<div class="video-container">

<iframe
src="${convertirVideo(valor)}"
frameborder="0"
allowfullscreen>
</iframe>

</div>

<div class="texto-pro">${descripcion}</div>

<div class="botones-qr">

<button class="btn-copy"
onclick="navigator.clipboard.writeText('${valor}');mostrarMensaje('Link copiado')">
📋 Copiar link
</button>

<button class="btn-download"
onclick="window.open('${valor}','_blank')">
▶ Abrir video
</button>

</div>

</div>
`
}

return `
<div class="card-pro" data-cat="${categoriaActual}">

<h2>${nombre}</h2>

<div class="texto-pro">
${valor}
${descripcion}
</div>

<button class="btn-copy" onclick="copiarTarjeta(this)">
📋 Copiar
</button>

</div>
`
}

/* ============================ */
/* BUSCADOR */
/* ============================ */

function buscarGeneral(e,id){

let input = e.target.value.toLowerCase()

let contenedor = document.getElementById("contenido_"+id)

contenedor.querySelectorAll(".card-pro").forEach(card=>{

let texto = card.innerText.toLowerCase()

card.style.display = texto.includes(input) ? "block" : "none"

})

}

/* ============================ */
/* COPIAR TARJETA (FIX) */
/* ============================ */

function copiarTarjeta(btn){

let tarjeta = btn.closest(".card-pro")

// 🔥 Clonar la tarjeta para modificar sin afectar la original
let clon = tarjeta.cloneNode(true)

// ❌ eliminar título
let titulo = clon.querySelector("h2")
if(titulo) titulo.remove()

// ❌ eliminar botones
clon.querySelectorAll("button").forEach(b=>b.remove())

// ❌ eliminar iframes (videos si hay)
clon.querySelectorAll("iframe").forEach(v=>v.remove())

// obtener texto limpio
let texto = clon.innerText.trim()

navigator.clipboard.writeText(texto)

.then(()=>{
mostrarMensaje("📋 Tarjeta copiada")
})

.catch(()=>{

let area=document.createElement("textarea")
area.value=texto

document.body.appendChild(area)
area.select()
document.execCommand("copy")
document.body.removeChild(area)

mostrarMensaje("📋 Copiado")

})

}
  

/* ============================ */
/* UTILIDADES */
/* ============================ */

async function copiarQR(id){
let img=document.getElementById(id)
const res=await fetch(img.src)
const blob=await res.blob()

await navigator.clipboard.write([
new ClipboardItem({[blob.type]:blob})
])

mostrarMensaje("Imagen copiada")
}

function descargarQR(url,nombre){
let a=document.createElement("a")
a.href=url
a.download=nombre+".png"
a.click()
}

function zoomQR(id){
document.getElementById(id).classList.toggle("zoom")
}

function mostrarMensaje(txt){
let aviso=document.createElement("div")
aviso.innerText=txt
aviso.className="toast"
document.body.appendChild(aviso)
setTimeout(()=>aviso.remove(),1500)
}

function logout(){
localStorage.clear()
window.location.href="login.html"
}

/* ============================ */
/* VIDEO */
/* ============================ */

function convertirVideo(link){

if(link.includes("youtube.com/watch")){
let id = link.split("v=")[1].split("&")[0]
return "https://www.youtube.com/embed/"+id
}

if(link.includes("youtube.com/shorts")){
let id = link.split("/shorts/")[1]
return "https://www.youtube.com/embed/"+id
}

if(link.includes("youtu.be")){
let id = link.split("/").pop()
return "https://www.youtube.com/embed/"+id
}

if(link.includes("tiktok.com")){
return link.replace("/video/","/embed/")
}

if(link.includes("instagram.com")){
return link+"/embed"
}

if(link.includes("facebook.com")){
return "https://www.facebook.com/plugins/video.php?href="+link
}

return link
}

/* ============================ */
/* FILTRO */
/* ============================ */

function filtrarSub(cat){

document.querySelectorAll(".btn-sub").forEach(btn=>{
btn.classList.toggle("active", btn.innerText.trim()==cat)
})

document.querySelectorAll(".card-pro").forEach(card=>{
card.style.display = (card.dataset.cat===cat) ? "block" : "none"
})

window.scrollTo({top:0,behavior:"smooth"})
}

/* ============================ */

cargarCategorias()

</script>

</body>
</html>
